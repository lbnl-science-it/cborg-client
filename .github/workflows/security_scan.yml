name: Security Scan and SecObserve Upload

permissions:
  contents: read
  security-events: write
on:
  push:
    branches: [ '**' ]
  workflow_dispatch:
    inputs:
      fetch_depth:
        description: 'Number of commits to fetch (0 for all history)'
        required: false
        default: '1'
        type: string
  workflow_call:
    inputs:
      fetch_depth:
        description: 'Number of commits to fetch (0 for all history)'
        required: false
        default: '1'
        type: string

env:
  WORKFLOW_VERSION: "1.10.0"
  # Pin Docker images by digest for reproducibility (avoid floating monthly tags).
  # secobserve-scanners:2026_04 amd64 digest:
  SO_SCANNERS_IMAGE: 'ghcr.io/secobserve/secobserve-scanners@sha256:c142c4bac337fefebc991b5b9b43b26b371ed44672c0f5291f819faa1902f9e7'
  # osv-scanner v2.3.8 amd64 digest:
  OSV_SCANNER_IMAGE: 'ghcr.io/google/osv-scanner@sha256:904f48030672996473eda96b9193a090c0b2096b0d45b63e51b19b34533b7171'

jobs:
  security_scan:
    runs-on: arc-runner-set
    # Gitleaks (secret scanning) runs on every branch. The heavier scanners and
    # the security gate only run on the privileged branch set (default branch,
    # main, master, dev, sec) or a manual dispatch.
    env:
      FULL_SCAN: ${{ github.event_name == 'workflow_dispatch' || github.ref_name == github.event.repository.default_branch || contains(fromJSON('["main","master","dev","sec"]'), github.ref_name) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: ${{ inputs.fetch_depth || 1 }}

      # 1. Run TruffleHog (local action pins secobserve-scanners image by digest)
      - name: Run TruffleHog
        uses: lbnl-science-it/security-workflows/.github/actions/trufflehog@main
        with:
          report_name: 'trufflehog.json'
          so_api_base_url: ${{ vars.SO_API_BASE_URL }}
          so_api_token: ${{ secrets.SO_API_TOKEN }}
          so_product_name: ${{ github.event.repository.name }}
          so_branch_name: ${{ github.ref_name }}
          so_origin_service: git-scan
          so_origin_docker_image_name_tag: ${{ github.sha }}

      # 2. Run Trivy (local action pins secobserve-scanners image by digest)
      - name: Run Trivy Filesystem
        if: env.FULL_SCAN == 'true'
        uses: lbnl-science-it/security-workflows/.github/actions/trivy_filesystem@main
        with:
          target: '.'
          report_name: 'trivy.json'
          so_api_base_url: ${{ vars.SO_API_BASE_URL }}
          so_api_token: ${{ secrets.SO_API_TOKEN }}
          so_product_name: ${{ github.event.repository.name }}
          so_branch_name: ${{ github.ref_name }}
          so_origin_service: git-scan
          so_origin_docker_image_name_tag: ${{ github.sha }}

      # 3. Run OSV-Scanner (pinned by image digest for total immutability)
      - name: Generate OSV-Scanner Report
        if: env.FULL_SCAN == 'true'
        run: |
          docker run --rm -v ${{ github.workspace }}:/src ${{ env.OSV_SCANNER_IMAGE }} \
            scan \
            --format sarif \
            --recursive \
            /src > osv_scanner.sarif || true
          # OSV-Scanner writes nothing to stdout when no vulnerabilities are found,
          # which leaves an empty file that SecObserve rejects. Write a minimal
          # valid SARIF envelope so the importer can process it.
          if [ ! -s osv_scanner.sarif ]; then
            echo '{"version":"2.1.0","$schema":"https://raw.githubusercontent.com/oasis-tcs/sarif-spec/main/sarif-2.1/schema/sarif-schema-2.1.0.json","runs":[{"tool":{"driver":{"name":"osv-scanner","informationUri":"https://github.com/google/osv-scanner","rules":[]}},"results":[]}]}' > osv_scanner.sarif
          fi

      - name: Upload OSV-Scanner to SecObserve
        if: env.FULL_SCAN == 'true'
        uses: lbnl-science-it/security-workflows/.github/actions/importer@main
        with:
          so_file_name: 'osv_scanner.sarif'
          so_parser_name: 'SARIF'
          so_api_base_url: ${{ vars.SO_API_BASE_URL }}
          so_api_token: ${{ secrets.SO_API_TOKEN }}
          so_product_name: ${{ github.event.repository.name }}
          so_branch_name: ${{ github.ref_name }}
          so_origin_service: git-scan
          so_origin_docker_image_name_tag: ${{ github.sha }}

      # 4. Run Semgrep (local action pins secobserve-scanners image by digest)
      - name: Run Semgrep
        if: env.FULL_SCAN == 'true'
        uses: lbnl-science-it/security-workflows/.github/actions/semgrep@main
        with:
          target: '.'
          configuration: 'p/default'
          report_name: 'semgrep.json'
          so_upload: 'false'
          so_api_base_url: ${{ vars.SO_API_BASE_URL }}
          so_api_token: ${{ secrets.SO_API_TOKEN }}
          so_product_name: ${{ github.event.repository.name }}
          so_branch_name: ${{ github.ref_name }}
          so_origin_service: git-scan
          so_origin_docker_image_name_tag: ${{ github.sha }}

      - name: Filter Semgrep Report
        if: env.FULL_SCAN == 'true' && always()
        run: |
          if [ -f semgrep.json ]; then
            python3 -c "
          import json, os, sys
          try:
              with open('semgrep.json', 'r') as f:
                  data = json.load(f)
              filtered = False
              if isinstance(data, dict):
                  if 'runs' in data:
                      for run in data.get('runs', []):
                          if 'results' in run:
                              orig = len(run['results'])
                              run['results'] = [r for r in run['results'] if not any(k in r.get('ruleId', '').lower() for k in ['secret', 'private-key', 'private_key', 'api-key', 'api_key'])]
                              if len(run['results']) < orig:
                                  filtered = True
                  elif 'results' in data:
                      orig = len(data['results'])
                      data['results'] = [r for r in data['results'] if not any(k in r.get('check_id', '').lower() for k in ['secret', 'private-key', 'private_key', 'api-key', 'api_key'])]
                      if len(data['results']) < orig:
                          filtered = True
              if filtered:
                  with open('semgrep.json', 'w') as f:
                      json.dump(data, f, indent=2)
                  print('Filtered secrets from semgrep.json')
              else:
                  print('No secrets found/filtered in semgrep.json')
          except Exception as e:
              print(f'Error filtering semgrep.json: {e}')
            "
          fi

      - name: Upload Semgrep to SecObserve
        if: env.FULL_SCAN == 'true' && always()
        uses: lbnl-science-it/security-workflows/.github/actions/importer@main
        with:
          so_file_name: 'semgrep.json'
          so_parser_name: 'SARIF'
          so_api_base_url: ${{ vars.SO_API_BASE_URL }}
          so_api_token: ${{ secrets.SO_API_TOKEN }}
          so_product_name: ${{ github.event.repository.name }}
          so_branch_name: ${{ github.ref_name }}
          so_origin_service: git-scan
          so_origin_docker_image_name_tag: ${{ github.sha }}

      # 5. Check SecObserve security gate (local action pins secobserve-scanners image by digest)
      - name: Check Security Gate
        if: env.FULL_SCAN == 'true'
        uses: lbnl-science-it/security-workflows/.github/actions/check_security_gate@main
        with:
          so_api_base_url: ${{ vars.SO_API_BASE_URL }}
          so_api_token: ${{ secrets.SO_API_TOKEN }}
          so_product_name: ${{ github.event.repository.name }}

      # 6. Upload Artifacts (filenames contain the commit SHA for traceability)
      - name: Upload Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: security-reports-${{ github.sha }}
          if-no-files-found: ignore
          path: |
            trufflehog.json
            trivy.json
            osv_scanner.sarif
            semgrep.json
